<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membros — Clube dos Referidos</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    /* --- Search bar --- */
    .search-row {
      display: flex;
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
      align-items: center;
    }

    .search-input-wrapper {
      position: relative;
      flex: 1;
      min-width: 240px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 1rem; height: 1rem;
      display: flex; align-items: center;
    }

    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 0.7rem 1rem 0.7rem 2.8rem;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      transition: all var(--transition);
      font-family: var(--font-body);
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,200,232,0.1);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    /* --- Filter tags --- */
    .tags-filter {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-bottom: var(--space-xl);
    }

    .tag-btn {
      padding: 0.35rem 0.9rem;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 2rem;
      color: var(--text-secondary);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }

    .tag-btn:hover,
    .tag-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* --- Members count --- */
    .members-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-lg);
    }

    .members-count {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .members-count strong {
      color: var(--accent);
    }

    /* --- Grid de membros --- */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--space-lg);
    }

    /* --- Card de membro --- */
    .member-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
    }

    .member-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 0 0 1px rgba(0,200,232,0.35), 0 12px 40px rgba(0,200,232,0.18);
    }

    /* Área de foto + fundo */
    .member-card-top {
      position: relative;
      background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(0,200,232,0.05) 100%);
      padding: var(--space-xl) var(--space-xl) 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Foto do membro */
    .member-avatar {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--border-subtle);
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-md);
      flex-shrink: 0;
      position: relative;
    }

    .member-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .member-avatar-initials {
      font-family: var(--font-display);
      font-size: 2.4rem;
      color: var(--accent);
      opacity: 0.8;
    }

    .featured-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: #000;
      box-shadow: 0 0 8px rgba(0,200,232,0.6);
    }

    .member-name {
      font-family: var(--font-display);
      font-size: 1.3rem;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .member-role {
      font-size: 0.9rem;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .member-company {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .member-location {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.83rem;
      color: var(--text-muted);
      margin-top: var(--space-sm);
      padding-bottom: var(--space-lg);
    }

    /* Body do card */
    .member-card-body {
      padding: var(--space-lg);
      flex: 1;
    }

    .member-bio {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: var(--space-md);
    }

    /* Tags de especialidade */
    .member-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: var(--space-lg);
    }

    .member-tag {
      font-size: 0.68rem;
      padding: 3px 9px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 2rem;
      color: var(--text-muted);
    }

    /* Redes sociais */
    .member-socials {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0.4rem 0.8rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      font-size: 0.78rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all var(--transition);
    }

    .social-link:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    /* Separador decorativo entre top e body */
    .member-card-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
      margin: 0 var(--space-lg);
    }

    /* --- Empty state --- */
    .no-results {
      text-align: center;
      padding: var(--space-3xl);
      color: var(--text-muted);
    }

    .no-results .no-icon {
      width: 2.5rem; height: 2.5rem;
      margin: 0 auto var(--space-md);
      opacity: 0.4;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .members-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div id="sidebar-mount"></div>

<div class="app-layout">
  <div class="main-content">

    <div class="page-header">
      <h1>Painel de Membros</h1>
      <p>Conheça quem faz parte do Clube dos Referidos — perfis, especialidades e conexões.</p>
    </div>

    <div class="page-body">

      <!-- Busca + Filtros -->
      <div class="search-row">
        <div class="search-input-wrapper">
          <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input
            type="text"
            class="search-input"
            id="searchInput"
            placeholder="Buscar por nome, cargo, empresa..."
            oninput="onSearch()"
          >
        </div>
      </div>

      <!-- Tags de especialidade -->
      <div class="tags-filter" id="tagsFilter">
        <button class="tag-btn active" onclick="filterTag(null, this)">Todos</button>
      </div>

      <!-- Banner: complete seu perfil -->
      <div id="completarPerfilBanner" style="display:none; align-items:center; justify-content:space-between; gap:1rem; background:var(--accent-dim); border:1px solid var(--border); border-radius:var(--radius-lg); padding:var(--space-md) var(--space-lg); margin-bottom:var(--space-xl); flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:0.75rem;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span style="font-size:0.88rem; color:var(--text-primary);">Os cards abaixo são <strong>exemplos</strong>. Complete seu perfil para aparecer aqui de verdade!</span>
        </div>
        <a href="perfil.html" class="btn btn-primary btn-sm">Completar meu perfil →</a>
      </div>

      <!-- Contador -->
      <div class="members-meta">
        <div class="members-count" id="membersCount">Carregando...</div>
      </div>

      <!-- Grid de membros -->
      <div class="members-grid" id="membersGrid"></div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  let activeTag = null;
  let searchQuery = '';
  let MEMBROS = [];

  const SOCIAL_META = {
    instagram: { icon: '<svg style="width:0.9em;height:0.9em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>', label: 'Instagram' },
    linkedin:  { icon: '<svg style="width:0.9em;height:0.9em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>', label: 'LinkedIn' },
    whatsapp:  { icon: '<svg style="width:0.9em;height:0.9em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>', label: 'WhatsApp' },
    twitter:   { icon: '<svg style="width:0.9em;height:0.9em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>', label: 'Twitter' },
  };

  document.addEventListener('DOMContentLoaded', async () => {
    await initSidebar();
    await loadMembros();
  });

  // Dados de exemplo — ficam visíveis enquanto nenhum membro preencheu o perfil
  const DEMO_MEMBROS = [
    {
      id: 'demo1', name: 'Gustavo Lima', role: 'Co-Fundador', company: 'Wise Up / WSP',
      city: 'São Paulo, SP', bio: 'Empresário, mentor em vendas e franqueado Wise Up. Especialista em times comerciais de alta performance.',
      photo: 'images/gustavo-lima.jpg', socials: { instagram: '', linkedin: '' },
      tags: ['Vendas Ativas', 'Liderança', 'Wise Up'], featured: true,
    },
    {
      id: 'demo2', name: 'Juliana Daleva', role: 'Co-Fundadora', company: 'Wise Up / WSP',
      city: 'São Paulo, SP', bio: 'Empresária, mentora em vendas e recordista em vendas ativas. Referência em formação de times de alta performance.',
      photo: 'images/juliana-daleva.jpg', socials: { instagram: '', linkedin: '' },
      tags: ['Vendas Ativas', 'Times Comerciais', 'Wise Up'], featured: true,
    },
    {
      id: 'demo3', name: 'Membro Exemplo', role: 'Diretor Comercial', company: 'Empresa',
      city: 'Rio de Janeiro, RJ', bio: 'Este é um card de exemplo. Quando você preencher seu perfil clicando em "Meu Perfil" na barra lateral, seu card real aparecerá aqui.',
      photo: '', socials: { instagram: '', linkedin: '' },
      tags: ['Vendas B2B', 'Liderança'], featured: false,
    },
  ];

  async function loadMembros() {
    document.getElementById('membersCount').textContent = 'Carregando...';

    const { data, error } = await supabaseClient
      .from('profiles')
      .select('id, full_name, email, role, company, city, bio, photo_url, photo_offset_x, photo_offset_y, instagram, linkedin, whatsapp, tags, show_in_directory, approved')
      .eq('approved', true)
      .eq('show_in_directory', true)
      .order('full_name', { ascending: true });

    const reais = (!error && data)
      ? data.filter(p => p.full_name).map(p => ({
          id: p.id, name: p.full_name, role: p.role || 'Membro',
          company: p.company || '', city: p.city || '—', bio: p.bio || '',
          photo: p.photo_url || '',
          photoOffsetX: p.photo_offset_x ?? 50,
          photoOffsetY: p.photo_offset_y ?? 50,
          socials: { instagram: p.instagram || '', linkedin: p.linkedin || '', whatsapp: p.whatsapp || '' },
          tags: p.tags || [], featured: false,
        }))
      : [];

    // Mistura reais + demos enquanto houver menos de 5 membros reais
    if (reais.length >= 5) {
      MEMBROS = reais;
    } else {
      // Evita duplicar pelo nome
      const nomesReais = new Set(reais.map(m => m.name.toLowerCase()));
      const demosFiltrados = DEMO_MEMBROS.filter(d => !nomesReais.has(d.name.toLowerCase()));
      MEMBROS = [...reais, ...demosFiltrados];
    }

    // Banner "complete seu perfil" se não há dados reais
    const banner = document.getElementById('completarPerfilBanner');
    if (banner) banner.style.display = reais.length === 0 ? 'flex' : 'none';

    buildTagsFilter();
    renderMembers();
  }

  // Stemmer leve para português: reduz plural → singular por palavra
  function stemPT(word) {
    if (word.endsWith('ais') && word.length > 4) return word.slice(0, -3) + 'al';
    if (word.endsWith('eis') && word.length > 4) return word.slice(0, -3) + 'el';
    if (word.endsWith('ns')  && word.length > 3) return word.slice(0, -2) + 'm';
    if (word.endsWith('s')   && word.length > 3) return word.slice(0, -1);
    return word;
  }

  // Normaliza uma tag: lowercase + stem — "Times Comerciais" → "time comercial"
  function normalizeTag(tag) {
    return tag.trim().toLowerCase().split(/\s+/).map(stemPT).join(' ');
  }

  // Expande tags que usam "/" como separador: "Wise Up / WSP" → ["Wise Up", "WSP"]
  function expandTags(tags) {
    return (tags || []).flatMap(tag =>
      tag.split('/').map(t => t.trim()).filter(Boolean)
    );
  }

  function buildTagsFilter() {
    const seen = new Map(); // chave normalizada → label de exibição
    // Expande "/" antes de normalizar
    MEMBROS.flatMap(m => expandTags(m.tags)).forEach(tag => {
      const raw = tag.trim();
      const key = normalizeTag(raw);
      if (!key) return;
      if (!seen.has(key)) {
        seen.set(key, raw);
      } else {
        // Prefere a forma mais longa como label
        if (raw.length > seen.get(key).length) seen.set(key, raw);
      }
    });

    const sorted = [...seen.entries()].sort((a, b) => a[0].localeCompare(b[0], 'pt'));
    const bar = document.getElementById('tagsFilter');

    sorted.forEach(([key, label]) => {
      const btn = document.createElement('button');
      btn.className = 'tag-btn';
      btn.textContent = label;
      btn.onclick = () => filterTag(key, btn);
      bar.appendChild(btn);
    });
  }

  function filterTag(tagKey, btn) {
    activeTag = tagKey;
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMembers();
  }

  function onSearch() {
    searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
    renderMembers();
  }

  function getFilteredMembers() {
    return MEMBROS.filter(m => {
      // Expande "/" e compara cada sub-tag normalizada
      const matchesTag = !activeTag ||
        expandTags(m.tags).some(t => normalizeTag(t) === activeTag);
      const matchesSearch = !searchQuery || [
        m.name, m.role, m.company, m.city, m.bio, ...(m.tags || [])
      ].join(' ').toLowerCase().includes(searchQuery);
      return matchesTag && matchesSearch;
    });
  }

  function renderMembers() {
    const filtered = getFilteredMembers();
    const grid = document.getElementById('membersGrid');
    const count = document.getElementById('membersCount');

    count.innerHTML = `<strong>${filtered.length}</strong> membro${filtered.length !== 1 ? 's' : ''} encontrado${filtered.length !== 1 ? 's' : ''}`;

    if (!filtered.length) {
      grid.innerHTML = `
        <div class="no-results" style="grid-column:1/-1;">
          <div class="no-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
          <p>Nenhum membro encontrado com esse filtro.</p>
        </div>
      `;
      return;
    }

    // Destaca featured primeiro
    const sorted = [...filtered].sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));
    grid.innerHTML = sorted.map(renderMemberCard).join('');
  }

  function renderMemberCard(membro) {
    const initials = membro.name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();

    const avatarHTML = membro.photo
      ? `<img src="${membro.photo}" alt="${membro.name}" loading="lazy">`
      : `<div class="member-avatar-initials">${initials}</div>`;

    const featuredBadge = membro.featured
      ? `<div class="featured-badge" title="Membro fundador"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>`
      : '';

    const tagsHTML = (membro.tags || []).map(t =>
      `<span class="member-tag">${t}</span>`
    ).join('');

    const socialsHTML = Object.entries(membro.socials || {})
      .filter(([, url]) => url)
      .map(([platform, url]) => {
        const meta = SOCIAL_META[platform] || { icon: '<svg style="width:0.9em;height:0.9em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>', label: platform };
        return `<a href="${url}" class="social-link" target="_blank" rel="noopener">
          ${meta.icon} ${meta.label}
        </a>`;
      }).join('');

    return `
      <div class="member-card ${membro.featured ? 'featured' : ''}">

        <div class="member-card-top">
          <div class="member-avatar">
            ${avatarHTML}
            ${featuredBadge}
          </div>

          <div class="member-name">${membro.name}</div>
          <div class="member-role">${membro.role}</div>
          ${membro.company ? `<div class="member-company">${membro.company}</div>` : ''}
          <div class="member-location">
            <svg style="width:0.85em;height:0.85em;margin-right:0.25em;vertical-align:-0.1em;color:var(--accent)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${membro.city}
          </div>
        </div>

        <div class="member-card-divider"></div>

        <div class="member-card-body">
          <p class="member-bio">${membro.bio}</p>

          ${tagsHTML ? `<div class="member-tags">${tagsHTML}</div>` : ''}

          ${socialsHTML ? `<div class="member-socials">${socialsHTML}</div>` : ''}
        </div>

      </div>
    `;
  }
</script>
</body>
</html>
