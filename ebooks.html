<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eBooks e PDFs — Clube dos Referidos</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    /* --- Category Filter --- */
    .filter-bar {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-bottom: var(--space-xl);
    }

    .filter-btn {
      padding: 0.4rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 2rem;
      color: var(--text-secondary);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* --- eBook grid --- */
    .ebooks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-xl);
    }

    .ebook-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
    }

    .ebook-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 200, 232, 0.12);
    }

    .ebook-cover {
      width: 100%;
      aspect-ratio: 3/4;
      background: var(--bg-secondary);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .ebook-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ebook-cover-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      padding: var(--space-xl);
      text-align: center;
    }

    .ebook-cover-placeholder .cover-icon {
      font-size: 2.5rem;
      opacity: 0.5;
    }

    .ebook-cover-placeholder .cover-title {
      font-family: var(--font-display);
      font-size: 1rem;
      letter-spacing: 0.05em;
      color: var(--accent);
      opacity: 0.7;
      line-height: 1.3;
    }

    .ebook-category-badge {
      position: absolute;
      top: var(--space-sm);
      left: var(--space-sm);
    }

    .ebook-info {
      padding: var(--space-lg);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .ebook-title {
      font-weight: 700;
      font-size: 0.95rem;
      line-height: 1.4;
      margin-bottom: var(--space-sm);
    }

    .ebook-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.6;
      flex: 1;
      margin-bottom: var(--space-md);
    }

    .ebook-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-md);
    }

    .ebook-pages {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .ebook-type-icon {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      padding: 0.6rem;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: all var(--transition);
      width: 100%;
    }

    .btn-download:hover {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      box-shadow: var(--shadow-glow);
    }

    .ebook-count {
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: var(--accent);
    }
  </style>
</head>
<body>

<div id="sidebar-mount"></div>

<div class="app-layout">
  <div class="main-content">

    <div class="page-header">
      <h1>eBooks e PDFs</h1>
      <p>Materiais exclusivos para download. Leia, salve e aplique no seu dia a dia.</p>
    </div>

    <div class="page-body">

      <!-- Stats rápidos -->
      <div style="display:flex; gap:var(--space-xl); margin-bottom:var(--space-xl);">
        <div>
          <div class="ebook-count" id="ebookCount">0</div>
          <div style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em;">Materiais disponíveis</div>
        </div>
      </div>

      <!-- Filtros por categoria -->
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" onclick="filterCategory(null, this)">Todos</button>
      </div>

      <!-- Grid de eBooks -->
      <div class="ebooks-grid" id="ebooksGrid"></div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/data/ebooks.js"></script>
<script>
  let activeCategory = null;

  const TYPE_ICONS = {
    ebook:    `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
    pdf:      `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`,
    planilha: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>`,
  };

  document.addEventListener('DOMContentLoaded', async () => {
    await initSidebar();
    document.getElementById('ebookCount').textContent = EBOOKS.length;
    renderFilterBtns();
    renderEbooks();
  });

  function renderFilterBtns() {
    const bar = document.getElementById('filterBar');
    const categories = [...new Set(EBOOKS.map(e => e.category))];

    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = cat;
      btn.onclick = () => filterCategory(cat, btn);
      bar.appendChild(btn);
    });
  }

  function filterCategory(cat, btn) {
    activeCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderEbooks();
  }

  function renderEbooks() {
    const grid = document.getElementById('ebooksGrid');
    const filtered = activeCategory
      ? EBOOKS.filter(e => e.category === activeCategory)
      : EBOOKS;

    grid.innerHTML = filtered.map(ebook => `
      <div class="ebook-card">
        <div class="ebook-cover">
          ${ebook.cover
            ? `<img src="${ebook.cover}" alt="${ebook.title}" loading="lazy">`
            : `<div class="ebook-cover-placeholder">
                <span class="cover-icon">${TYPE_ICONS[ebook.type] || '📄'}</span>
                <span class="cover-title">${ebook.title}</span>
              </div>`
          }
          <div class="ebook-category-badge">
            <span class="badge badge-accent">${ebook.category}</span>
          </div>
        </div>

        <div class="ebook-info">
          <div class="ebook-title">${ebook.title}</div>
          <div class="ebook-desc">${ebook.desc}</div>

          <div class="ebook-meta">
            <span class="ebook-pages">${ebook.pages} páginas</span>
            <span class="ebook-type-icon">${TYPE_ICONS[ebook.type] || '📄'} ${ebook.type.toUpperCase()}</span>
          </div>

          <a href="${ebook.fileUrl}" class="btn-download" target="_blank" rel="noopener" download style="display:inline-flex;align-items:center;gap:0.4rem;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Baixar ${ebook.type === 'ebook' ? 'eBook' : 'PDF'}
          </a>
        </div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
