<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Aprovações | Clube dos Referidos</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    body { background: var(--bg-primary); min-height: 100vh; padding: var(--space-3xl) var(--space-2xl); }
    .admin-header { margin-bottom: var(--space-3xl); }
    .admin-title { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: var(--space-sm); }
    .admin-subtitle { color: var(--text-secondary); }
    .users-table { width: 100%; border-collapse: collapse; }
    .users-table th {
      text-align: left; padding: var(--space-md) var(--space-lg);
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-muted);
      border-bottom: 1px solid var(--border-subtle);
    }
    .users-table td {
      padding: var(--space-md) var(--space-lg);
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.9rem; color: var(--text-secondary);
      vertical-align: middle;
    }
    .users-table tr:hover td { background: var(--bg-card); }
    .badge-pending {
      display: inline-block; padding: 0.25rem 0.7rem;
      background: rgba(255,180,0,0.12); border: 1px solid rgba(255,180,0,0.35);
      color: #FFB400; border-radius: 2rem; font-size: 0.72rem; font-weight: 600;
    }
    .badge-approved {
      display: inline-block; padding: 0.25rem 0.7rem;
      background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.3);
      color: #00E5A0; border-radius: 2rem; font-size: 0.72rem; font-weight: 600;
    }
    .btn-approve, .btn-deny, .btn-revoke {
      padding: 0.4rem 1rem; border: none; border-radius: var(--radius-sm);
      font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-approve { background: var(--accent); color: #000; }
    .btn-deny { background: rgba(255,77,106,0.15); color: #FF6B84; border: 1px solid rgba(255,77,106,0.3); }
    .btn-revoke { background: rgba(255,180,0,0.12); color: #FFB400; border: 1px solid rgba(255,180,0,0.35); }
    .btn-approve:hover, .btn-deny:hover, .btn-revoke:hover { opacity: 0.8; }
    .btn-approve:disabled, .btn-deny:disabled, .btn-revoke:disabled { opacity: 0.4; cursor: default; }
    .badge-denied {
      display: inline-block; padding: 0.25rem 0.7rem;
      background: rgba(255,77,106,0.1); border: 1px solid rgba(255,77,106,0.3);
      color: #FF6B84; border-radius: 2rem; font-size: 0.72rem; font-weight: 600;
    }
    .action-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    #loadingMsg { color: var(--text-muted); margin-bottom: var(--space-xl); }
    #adminGate { display: none; }
    #loginForm { max-width: 360px; }
    .input-password-wrap { position: relative; }
    .input-password-wrap .form-control { padding-right: 2.8rem; }
    .toggle-pw {
      position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0;
      color: var(--text-muted); transition: color 0.2s; display: flex; align-items: center;
    }
    .toggle-pw:hover { color: var(--accent); }
  </style>
</head>
<body>

<div class="admin-header">
  <h1 class="admin-title">Painel de Aprovações</h1>
  <p class="admin-subtitle">Gerencie os membros aguardando acesso ao Clube dos Referidos.</p>
</div>

<div id="loginForm">
  <p style="color:var(--text-muted); margin-bottom: var(--space-lg);">Entre com sua conta de administrador para continuar.</p>
  <div class="form-group">
    <label class="form-label">Email</label>
    <input class="form-control" type="email" id="adminEmail" placeholder="admin@email.com">
  </div>
  <div class="form-group">
    <label class="form-label">Senha</label>
    <div class="input-password-wrap">
      <input class="form-control" type="password" id="adminPassword" placeholder="••••••••">
      <button type="button" class="toggle-pw" onclick="togglePw('adminPassword', this)" tabindex="-1">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <div id="loginError" class="alert alert-error" style="display:none; margin-bottom:var(--space-md);"></div>
  <button class="btn btn-primary" onclick="adminLogin()">Entrar</button>
</div>

<div id="adminGate">
  <p id="loadingMsg">Carregando usuários...</p>
  <table class="users-table" id="usersTable" style="display:none;">
    <thead>
      <tr>
        <th>Email</th>
        <th>Cadastro</th>
        <th>Status</th>
        <th>Ação</th>
      </tr>
    </thead>
    <tbody id="usersBody"></tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script>
  function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.innerHTML = isHidden
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  }

  const ADMIN_EMAIL = 'grupoalpha.alphaville@gmail.com';
  const RESEND_API_KEY = 're_ZE5ZdxAs_2rPKV5gGt8ECVQ8u2ZrT6Gh4';

  async function adminLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error || data.user.email !== ADMIN_EMAIL) {
      await supabaseClient.auth.signOut();
      errEl.textContent = 'Acesso negado. Conta sem permissão de administrador.';
      errEl.style.display = 'block';
      return;
    }
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('adminGate').style.display = 'block';
    loadUsers();
  }

  async function loadUsers() {
    const { data: authUsers, error } = await supabaseClient.rpc('get_all_users_with_profiles');

    if (error) {
      // fallback: list profiles only
      const { data: profiles } = await supabaseClient.from('profiles').select('*').order('created_at', { ascending: false });
      renderProfiles(profiles || []);
      return;
    }
    renderProfiles(authUsers || []);
  }

  function renderProfiles(users) {
    document.getElementById('loadingMsg').style.display = 'none';
    const table = document.getElementById('usersTable');
    const tbody = document.getElementById('usersBody');
    table.style.display = 'table';

    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-muted);text-align:center;padding:2rem;">Nenhum usuário encontrado.</td></tr>';
      return;
    }

    tbody.innerHTML = users.map(u => `
      <tr id="row-${u.id}">
        <td style="color:var(--text-primary);">${u.email || u.id}</td>
        <td>${u.created_at ? new Date(u.created_at).toLocaleDateString('pt-BR') : '—'}</td>
        <td id="status-${u.id}">
          ${u.approved === true  ? '<span class="badge-approved">Aprovado</span>'
          : u.approved === false && u.denied ? '<span class="badge-denied">Negado</span>'
          : '<span class="badge-pending">Aguardando</span>'}
        </td>
        <td>
          <div class="action-btns" id="actions-${u.id}">
            ${u.approved
              ? `<button class="btn-revoke" onclick="revokeUser('${u.id}', this)">Revogar acesso</button>`
              : `<button class="btn-approve" onclick="approveUser('${u.id}', '${u.email}', this)">Aprovar</button>
                 <button class="btn-deny" onclick="denyUser('${u.id}', this)">Negar</button>`}
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function approveUser(userId, email, btn) {
    btn.disabled = true;
    btn.textContent = 'Aprovando...';
    const { error } = await supabaseClient.from('profiles').update({ approved: true }).eq('id', userId);
    if (error) {
      btn.disabled = false;
      btn.textContent = 'Aprovar';
      alert('Erro ao aprovar. Tente novamente.');
      return;
    }
    if (RESEND_API_KEY && email) await sendApprovalEmail(email);
    document.getElementById('status-' + userId).innerHTML = '<span class="badge-approved">Aprovado</span>';
    document.getElementById('actions-' + userId).innerHTML = `<button class="btn-revoke" onclick="revokeUser('${userId}', this)">Revogar acesso</button>`;
  }

  async function denyUser(userId, btn) {
    if (!confirm('Tem certeza que deseja negar o acesso deste usuário?')) return;
    btn.disabled = true;
    btn.textContent = 'Negando...';
    const { error } = await supabaseClient.from('profiles').update({ approved: false }).eq('id', userId);
    if (error) {
      btn.disabled = false;
      btn.textContent = 'Negar';
      alert('Erro ao negar. Tente novamente.');
      return;
    }
    document.getElementById('status-' + userId).innerHTML = '<span class="badge-denied">Negado</span>';
    document.getElementById('actions-' + userId).innerHTML = `<button class="btn-approve" onclick="approveUser('${userId}', '', this)">Aprovar</button>`;
  }

  async function revokeUser(userId, btn) {
    if (!confirm('Tem certeza que deseja revogar o acesso deste usuário?')) return;
    btn.disabled = true;
    btn.textContent = 'Revogando...';
    const { error } = await supabaseClient.from('profiles').update({ approved: false }).eq('id', userId);
    if (error) {
      btn.disabled = false;
      btn.textContent = 'Revogar acesso';
      alert('Erro ao revogar. Tente novamente.');
      return;
    }
    document.getElementById('status-' + userId).innerHTML = '<span class="badge-pending">Aguardando</span>';
    document.getElementById('actions-' + userId).innerHTML = `
      <button class="btn-approve" onclick="approveUser('${userId}', '', this)">Aprovar</button>
      <button class="btn-deny" onclick="denyUser('${userId}', this)">Negar</button>`;
  }

  async function sendApprovalEmail(toEmail) {
    try {
      await fetch('https://api.resend.com/emails', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + RESEND_API_KEY,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          from: 'Clube dos Referidos <noreply@clubedosreferidos.com>',
          to: [toEmail],
          subject: 'Clube dos Referidos — Seu acesso foi liberado! 🎉',
          html: `
            <div style="background:#0A0A0A;padding:40px;font-family:Arial,sans-serif;color:#fff;max-width:560px;margin:0 auto;border-radius:12px;">
              <img src="https://clubedosreferidos.com/images/logo.png" alt="Clube dos Referidos" style="height:80px;margin-bottom:32px;">
              <h1 style="color:#00E5FF;font-size:24px;margin-bottom:16px;">Seu acesso foi liberado!</h1>
              <p style="color:#9CA3AF;line-height:1.7;margin-bottom:24px;">
                Parabéns! Sua solicitação de acesso ao <strong style="color:#fff;">Clube dos Referidos</strong> foi aprovada.<br>
                Agora você pode entrar na plataforma e acessar todo o conteúdo exclusivo.
              </p>
              <a href="https://clubedosreferidos.com" style="display:inline-block;background:#00E5FF;color:#000;font-weight:700;padding:14px 28px;border-radius:8px;text-decoration:none;font-size:15px;">
                Acessar minha conta →
              </a>
              <p style="color:#555;font-size:12px;margin-top:32px;border-top:1px solid #222;padding-top:16px;">
                Clube dos Referidos · clubedosreferidos.com
              </p>
            </div>
          `
        })
      });
    } catch(e) {
      console.error('Erro ao enviar email:', e);
    }
  }
</script>
</body>
</html>
